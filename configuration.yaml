    name: Nightly Dim Brightness
    icon: mdi:brightness-6
    min: 1
    max: 100
    step: 5
    unit_of_measurement: '%'
    initial: 10
  airbnb_heater_temperature:
    name: Airbnb Heater Temperature
    icon: mdi:thermometer
    min: 10
    max: 30
    step: 1
    unit_of_measurement: °C
    initial: 20
  vent_fan_heat_threshold:
    name: Vent Fan Heat Threshold
    icon: mdi:thermometer-low
    min: 15
    max: 25
    step: 1
    unit_of_measurement: °C
    initial: 21
  vent_fan_cool_threshold:
    name: Vent Fan Cool Threshold
    icon: mdi:thermometer-high
    min: 20
    max: 30
    step: 1
    unit_of_measurement: °C
    initial: 23
  stairs_late_night_brightness:
    name: Stairs Late Night Brightness
    icon: mdi:stairs
    min: 1
    max: 100
    step: 5
    unit_of_measurement: '%'
    initial: 10
  stairs_day_brightness:
    name: Stairs Day Brightness
    icon: mdi:stairs
    min: 1
    max: 100
    step: 5
    unit_of_measurement: '%'
    initial: 100

