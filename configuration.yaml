default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include_dir_merge_list automations/
script: !include scripts.yaml
scene: !include scenes.yaml

# Manual override toggle for kitchen auto lights
# Set by manual-off trigger in downstairs_cabinet_occupancy_auto
# Cleared by unoccupied event immediately, or by 15-minute cooldown
input_number:
