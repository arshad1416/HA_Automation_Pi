# Downstairs Occupancy Lighting — REWRITE: 5 branches, <200 lines
# Occupied (motion OR presence)→on | Unoccupied→off | Quiet hrs (00:00→sunrise): cabinet+kick only
# Manual off→15-min cooldown | HA start→on if occupied/off if empty | Watchdog→force off 30min no-motion
# FIX 2026-06-23: converted from dict to list for !include_dir_merge_list; added id; removed unavailable
#   light.kitchen_light_light_1; added continue_on_error to bright light calls;
#   replaced invalid 'before: sunrise' (time condition) with a template condition.
- id: downstairs_occupancy_lighting
  alias: Downstairs Occupancy Lighting
  description: 'Consolidated kitchen lighting. Single source binary_sensor.kitchen_presence (mmWave primary, Nest Hub fallback, 5-min off-delay). Branches: occupied, unoccupied, manual-off cooldown, HA start.'
  mode: queued
  max: 10
  max_exceeded: silent
  trigger:
    - id: occupied
      platform: state
      entity_id: binary_sensor.kitchen_presence
      to: 'on'
    - id: occupied
      platform: state
      entity_id: timer.kitchen_manual_cooldown
      to: idle
    - id: unoccupied
      platform: state
      entity_id: binary_sensor.kitchen_presence
      to: 'off'
      for: { minutes: 5 }
    - id: manual_off
      platform: state
      entity_id: light.kitchen_light
      to: 'off'
    - id: ha_start
      platform: homeassistant
      event: start
  condition: []
  action:
    - choose:
      - conditions:
        - condition: trigger
          id: occupied
        - condition: not
          conditions:
          - condition: state
            entity_id: timer.kitchen_manual_cooldown
            state: active
        - condition: state
          entity_id: binary_sensor.kitchen_presence
          state: 'on'
        sequence:
        - action: light.turn_on
          target:
            entity_id: &ambient [light.cabinet_light_strip_left_nanoleaf_light_strip, light.cabinet_light_strip_center_nanoleaf_light_strip, light.cabinet_light_strip_right_nanoleaf_light_strip, light.nanoleaf_multicolor_ls, light.nanoleaf_multicolor_ls_2]
          data: { brightness_pct: 100, transition: 1 }
        - if:
          - condition: not
            conditions:
            - condition: template
              value_template: >
                {% set nr = state_attr('sun.sun', 'next_rising') | as_datetime | as_local %}
                {{ now() < nr and now().date() == nr.date() }}
          - condition: or
            conditions:
            - condition: state
              entity_id: sun.sun
              state: below_horizon
            - condition: template
              value_template: '{{ state_attr("sun.sun", "elevation") | float(0) < 10 }}'
            - condition: state
              entity_id: weather.forecast_home
              state: [cloudy, rainy, snowy, fog, overcast, partlycloudy]
          then:
          - action: light.turn_on
            target:
              entity_id: &bright [light.kitchen_light, light.island_light_kitchen_island_light, light.island_light_light]
            data: { brightness_pct: 100 }
            continue_on_error: true
          - action: switch.turn_on
            target:
              entity_id: switch.kitchen_pantry_light
            continue_on_error: true
      - conditions:
        - condition: trigger
          id: unoccupied
        - condition: state
          entity_id: timer.kitchen_manual_cooldown
          state: idle
        - condition: state
          entity_id: binary_sensor.kitchen_presence
          state: 'off'
        sequence:
        - action: timer.cancel
          target:
            entity_id: timer.kitchen_manual_cooldown
        - action: light.turn_off
          target:
            entity_id: &all_off [light.kitchen_light, light.island_light_kitchen_island_light, light.island_light_light, light.cabinet_light_strip_left_nanoleaf_light_strip, light.cabinet_light_strip_center_nanoleaf_light_strip, light.cabinet_light_strip_right_nanoleaf_light_strip, light.nanoleaf_multicolor_ls, light.nanoleaf_multicolor_ls_2]
          continue_on_error: true
        - action: switch.turn_off
          target:
            entity_id: switch.kitchen_pantry_light
          continue_on_error: true
      - conditions:
        - condition: trigger
          id: manual_off
        - condition: template
          value_template: '{{ trigger.to_state.context.parent_id is none }}'
        sequence:
        - action: timer.start
          target:
            entity_id: timer.kitchen_manual_cooldown
          data: { duration: '00:15:00' }
        - action: light.turn_off
          target:
            entity_id: *all_off
          continue_on_error: true
        - action: switch.turn_off
          target:
            entity_id: switch.kitchen_pantry_light
          continue_on_error: true
      - conditions:
        - condition: trigger
          id: ha_start
        sequence:
        - if:
          - condition: state
            entity_id: binary_sensor.kitchen_presence
            state: 'on'
          then:
          - action: light.turn_on
            target:
              entity_id: *ambient
            data: { brightness_pct: 100 }
          else:
          - action: light.turn_off
            target:
              entity_id: *all_off
            continue_on_error: true
