    state: 'off'
  description: Catches stair lights left on by wall switch, voice command, scene, or any other path that doesn't flip switch.stairs_occupancy. If a stair light has been on for 15 min while presence is off and the presence switch has not gone on in the last 10 min, force the lights off.
  id: stairs_safety_off
  mode: single
  triggers:
  - entity_id:
    - light.stair_light
    - light.stair_light_2
    for:
      minutes: 15
    to: 'on'
    trigger: state
- actions:
  - if:
