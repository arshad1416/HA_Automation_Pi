    - action: fan.turn_off
      data: {}
      target:
        entity_id: fan.kitchen_ceiling_fan
    if:
    - above: 23.5
      condition: numeric_state
      entity_id: sensor.downstairs_echo_dot_temperature
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.kitchen_fan_switch_1
