- id: smart_vent_fan_control
  alias: Smart Vent Fan Control
  description: Unified vent fan control for Izaan and Mina. Heating + room < 21C -> fan ON. Cooling + room > 23C -> fan OFF. Idle or temp in range -> fan OFF. Re-evaluates every 10 min.
  mode: restart
  triggers:
  - trigger: state
    entity_id: climate.ecobee
    attribute: hvac_action
    id: hvac_change
  - trigger: time_pattern
    minutes: /10
    id: periodic
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: climate.ecobee
        attribute: hvac_action
        state: heating
      - condition: template
        value_template: |
          {{ states('sensor.izaans_room_temperature') | float(99) < states('input_number.vent_fan_heat_threshold') | int(21) }}
      sequence:
      - type: turn_on
        device_id: 25dad770b527d5c6d6baf47584abe766
        entity_id: e519bde78b1134019fb0c4d4564b39d1
        domain: fan
    - conditions:
      - condition: state
        entity_id: climate.ecobee
        attribute: hvac_action
        state: cooling
      - condition: template
        value_template: |
          {{ states('sensor.izaans_room_temperature') | float(0) > states('input_number.vent_fan_cool_threshold') | int(23) }}
      sequence:
      - type: turn_on
        device_id: 25dad770b527d5c6d6baf47584abe766
        entity_id: e519bde78b1134019fb0c4d4564b39d1
        domain: fan
    default:
    - type: turn_off
      device_id: 25dad770b527d5c6d6baf47584abe766
      entity_id: e519bde78b1134019fb0c4d4564b39d1
      domain: fan
  - choose:
    - conditions:
      - condition: state
        entity_id: climate.ecobee
        attribute: hvac_action
        state: heating
      - condition: template
        value_template: |
          {{ states('sensor.minas_room_temperature') | float(99) < states('input_number.vent_fan_heat_threshold') | int(21) }}
      sequence:
      - type: turn_on
        device_id: 1b59edc4ace13071d3afa094610548cd
        entity_id: 180cc60c0138a13c41bab968f6b33054
        domain: fan
    - conditions:
      - condition: state
        entity_id: climate.ecobee
        attribute: hvac_action
        state: cooling
      - condition: template
        value_template: |
          {{ states('sensor.minas_room_temperature') | float(0) > states('input_number.vent_fan_cool_threshold') | int(23) }}
      sequence:
      - type: turn_on
        device_id: 1b59edc4ace13071d3afa094610548cd
        entity_id: 180cc60c0138a13c41bab968f6b33054
        domain: fan
    default:
    - type: turn_off
      device_id: 1b59edc4ace13071d3afa094610548cd
      entity_id: 180cc60c0138a13c41bab968f6b33054
      domain: fan
- id: blinds_solar_shutter
  alias: blinds_solar_shutter
  description: Open all blinds at sunrise. In summer, close sun-facing blinds during direct-sun hours to block solar gain — only when sunny (cloud <60%, no rain). Reopen after sun passes window.
  mode: single
  triggers:
  - trigger: sun
    event: sunrise
    id: sunrise
  - trigger: time
    at: '12:00:00'
    id: dining_solar_close
  - trigger: time
    at: '16:00:00'
    id: nw_solar_close
  - trigger: time
    at: '18:00:00'
    id: dining_solar_open
  - trigger: time
    at: '20:00:00'
    id: nw_solar_open
  conditions:
  - condition: state
    entity_id: input_boolean.climate_ai_enabled
    state: 'on'
  actions:
  - if:
    - condition: trigger
      id: sunrise
    then:
    - action: cover.set_cover_position
      data:
        position: 100
      target:
        entity_id:
        - cover.living_room_blinds_curtain
        - cover.dining_room_blinds
        - cover.dining_room_blinds_curtain
        - cover.family_room_blinds
        - cover.family_room_blinds_curtain
        - cover.mina_s_blinds_curtain
  - if:
    - condition: trigger
      id: dining_solar_close
    - condition: state
      entity_id: input_boolean.climate_summer_mode
      state: 'on'
    - condition: template
      value_template: '{{ state_attr(''weather.forecast_home'', ''cloud_coverage'') | float(100) < 60 }}'
    - condition: template
      value_template: '{{ states(''weather.forecast_home'') not in [''rainy'', ''pouring''] }}'
    then:
    - action: cover.close_cover
      target:
        entity_id:
        - cover.dining_room_blinds_curtain
  - if:
    - condition: trigger
      id: nw_solar_close
    - condition: state
      entity_id: input_boolean.climate_summer_mode
      state: 'on'
    - condition: template
      value_template: '{{ state_attr(''weather.forecast_home'', ''cloud_coverage'') | float(100) < 60 }}'
    - condition: template
      value_template: '{{ states(''weather.forecast_home'') not in [''rainy'', ''pouring''] }}'
    then:
    - action: cover.close_cover
      target:
        entity_id:
        - cover.family_room_blinds_curtain
        - cover.mina_s_blinds_curtain
  - if:
    - condition: trigger
      id: dining_solar_open
    - condition: state
      entity_id: input_boolean.climate_summer_mode
      state: 'on'
    then:
    - action: cover.set_cover_position
      data:
        position: 100
      target:
        entity_id:
        - cover.dining_room_blinds
        - cover.dining_room_blinds_curtain
  - if:
    - condition: trigger
      id: nw_solar_open
    - condition: state
      entity_id: input_boolean.climate_summer_mode
      state: 'on'
    then:
    - action: cover.set_cover_position
      data:
        position: 100
      target:
        entity_id:
        - cover.family_room_blinds
        - cover.family_room_blinds_curtain
        - cover.mina_s_blinds_curtain
