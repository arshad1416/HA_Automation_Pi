- id: climate_season_switch
  alias: climate_season_switch
  description: Daily 3am check 7-day mean outdoor temp. 3-day hysteresis with counter tracking.
  mode: single
  triggers:
  - trigger: time
    at: 03:00:00
  conditions: []
  actions:
  - if:
    - condition: numeric_state
      entity_id: sensor.outdoor_temp_7_day_mean_2
      above: 15
    then:
    - action: counter.increment
      target:
        entity_id: counter.season_switch_summer
    - action: counter.reset
      target:
        entity_id: counter.season_switch_winter
    else:
    - if:
      - condition: numeric_state
        entity_id: sensor.outdoor_temp_7_day_mean_2
        below: 10
      then:
      - action: counter.increment
        target:
          entity_id: counter.season_switch_winter
      - action: counter.reset
        target:
          entity_id: counter.season_switch_summer
      else:
      - action: counter.reset
        target:
          entity_id: counter.season_switch_summer
      - action: counter.reset
        target:
          entity_id: counter.season_switch_winter
  - if:
    - condition: numeric_state
      entity_id: counter.season_switch_summer
      above: 2
    then:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.climate_summer_mode
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_winter_mode
    - action: counter.reset
      target:
        entity_id: counter.season_switch_summer
    - action: counter.reset
      target:
        entity_id: counter.season_switch_winter
  - if:
    - condition: numeric_state
      entity_id: counter.season_switch_winter
      above: 2
    then:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.climate_winter_mode
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_summer_mode
    - action: counter.reset
      target:
        entity_id: counter.season_switch_summer
    - action: counter.reset
      target:
        entity_id: counter.season_switch_winter
- id: bedtime_routine_auto
  alias: Bed Time Light Routine
  description: |
    Locks doors, shuts garage, turns off inside lights when asleep. Only fires after 21:00 to prevent daytime nap false triggers. 22:00 catch-up trigger handles early bedtimes. TV playing bypasses the sleep-confidence triggers but catch-up at 22:00 always fires regardless of TV state.
  triggers:
  - entity_id: sensor.oneplus_13_sleep_confidence
    above: 80
    for:
      minutes: 10
    trigger: numeric_state
    id: sleep_detected
  - entity_id: sensor.oneplus13_sleep_confidence
    above: 80
    for:
      minutes: 10
    trigger: numeric_state
    id: sleep_detected
  - entity_id: calendar.sleep_as_android
    to: 'on'
    trigger: state
    id: sleep_detected
  - trigger: time
    at: '22:00:00'
    id: catch_up
  conditions:
  - condition: time
    after: '21:00:00'
  - condition: template
    value_template: '{{ states(''media_player.lg_webos_tv_un8500auj'') not in [''playing'', ''on''] }}'
  actions:
  - action: lock.lock
    target:
      entity_id:
      - lock.front_door
      - lock.garages_entry_door
      - lock.front_door_2
      - lock.garage_entry
  - action: cover.close_cover
    target:
      entity_id:
      - cover.larissa_s_garage_door
      - cover.larissa_s_garage_door_door
  - delay:
      seconds: 10
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_light_light
      - light.island_light_kitchen_island_light
      - light.stair_light
      - light.stair_light_2
      - light.family_room_light
      - light.basement_tv
      - light.cabinet_light_strip_left_nanoleaf_light_strip
      - light.cabinet_light_strip_center_nanoleaf_light_strip
      - light.cabinet_light_strip_right_nanoleaf_light_strip
      - light.nanoleaf_multicolor_ls
      - light.nanoleaf_multicolor_ls_2
      - light.master_bedroom_closet_light
    data: {}
  - action: switch.turn_off
    target:
      entity_id:
      - switch.kitchen_pantry_light
      - switch.laundry_room_light
      - switch.living_room_floor_lamp
      - switch.dining_room_table_lights
      - switch.foyer_light
      - switch.sonoff_10001dccdc
      - switch.kitchen_pantry_light_socket_1
      - switch.basement_lights
      - switch.basement_stair_light
      - switch.garage_light_switch
      - switch.master_bedroom_fan_light
      - switch.back_hallway_light_main_switch
    data: {}
  - action: notify.mobile_app_pixel_8_pro
    data:
      message: |
        Bedtime routine ran (trigger: {{ trigger.id }}). Locks: {{ states('lock.front_door') }}/{{ states('lock.garages_entry_door') }}, Garage: {{ states('cover.larissa_s_garage_door') }}.
  mode: single
