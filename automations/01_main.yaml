      data:
        percentage: '{{ kitchen_speed }}'
      target:
        entity_id: fan.kitchen_ceiling_fan
  - else:
    - action: fan.turn_off
      data: {}
      target:
        entity_id: fan.master_bedroom_ceiling_fan
    if:
    - condition: state
      entity_id: person.home
      state: home
    - after: '21:00:00'
      before: 07:00:00
      condition: time
    - above: 23.5
      condition: numeric_state
      entity_id: sensor.upstairs_echo_dot_temperature
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.master_bedroom_fan_light_switch_1
    - action: fan.set_percentage
      data:
        percentage: '{{ master_speed }}'
