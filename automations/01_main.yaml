- id: low_battery_alert
  alias: Low Battery Alert - Daily
  description: Daily check of all battery sensors and alert if any are below 20%.
  mode: single
  triggers:
  - at: 09:00:00
    trigger: time
  conditions: []
  actions:
  - variables:
      low_batteries: |-
        {% set sensors = [
          'sensor.front_door_battery',
          'sensor.front_door_battery_2',
          'sensor.garages_entry_door_battery',
          'sensor.airbnb_battery',
          'sensor.airbnb_door_battery',
          'sensor.basement_battery',
          'sensor.basement_bathroom_leak_sensor_battery',
          'sensor.ensuite_leak_sensor_battery',
          'sensor.guest_bathroom_leak_sensor_battery',
          'sensor.kitchen_leak_sensor_battery',
          'sensor.laundry_room_leak_sensor_battery',
          'sensor.powder_room_leak_sensor_battery',
          'sensor.sump_pump_leak_sensor_battery',
          'sensor.izaans_room_battery',
          'sensor.minas_room_battery',
          'sensor.cat_feeder_battery'
        ] %} {% set ns = namespace(low=[]) %} {% for s in sensors %}
          {% set val = states(s) | int(-1) %}
          {% if val >= 0 and val < 20 %}
            {% set ns.low = ns.low + [s ~ ' (' ~ val ~ '%)'] %}
          {% endif %}
        {% endfor %} {{ ns.low | join(', ') }}
  - condition: template
    value_template: '{{ low_batteries | length > 0 }}'
  - action: notify.mobile_app_cph2655
    data:
      message: 'Low battery alert: {{ low_batteries }}'
      title: 🔋 Low Battery Alert
- id: office_heater_smart_control
  alias: Office Heater Smart Control
  description: Smart control for office heater based on temperature and occupancy.
  mode: single
  triggers:
  - above: 23
    entity_id: sensor.system_monitor_processor_temperature
    trigger: numeric_state
  - entity_id: binary_sensor.usb_c_mmwave_sensor_presence
    to: 'on'
    id: occupied
    trigger: state
  - entity_id: binary_sensor.usb_c_mmwave_sensor_presence
    to: 'off'
    for:
      minutes: 30
    id: unoccupied
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: occupied
      - condition: numeric_state
        entity_id: sensor.system_monitor_processor_temperature
        below: 20
      sequence:
