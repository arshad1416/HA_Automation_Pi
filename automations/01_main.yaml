      value_template: '{{ state_attr(''weather.forecast_home'', ''cloud_coverage'') | int(0) > 60 }}'
    - condition: template
      value_template: '{{ state_attr(''weather.forecast_home'', ''uv_index'') | float(0) < 2 }}'
  description: When front door opens during daytime and dark outside (overcast/low UV), turn on foyer light
  id: foyer_light_on_front_door_unlock
