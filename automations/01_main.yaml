      entity_id:
      - light.front_porch_downlight
      - light.front_porch_downlight_segment_1
      - light.front_porch_downlight_segment_2
      - light.front_porch_downlight_segment_3
      - light.front_porch_downlight_segment_4
      - light.front_porch_downlight_segment_5
      - light.front_porch_downlight_segment_6
      - light.front_porch_downlight_segment_7
