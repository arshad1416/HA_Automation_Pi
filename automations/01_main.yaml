- id: airbnb_sunset_logic
  alias: 'Airbnb: Sunset Logic'
  description: 'At sunset: reserved -> floodlight ON (scene.manual_on); not reserved -> motion-sensor mode (scene.sensor_mode). Does NOT touch the heater, preserving guest manual control.'
  mode: single
  triggers:
  - trigger: sun
    event: sunset
    offset: 0
  conditions: []
  actions:
  - if:
    - condition: template
      value_template: "{{ 'reserved' in (state_attr('calendar.airbnb','message') | string | lower) }}"
    then:
    - action: scene.turn_on
      target: {entity_id: scene.manual_on}
    else:
    - action: scene.turn_on
      target: {entity_id: scene.sensor_mode}
- id: airbnb_midnight_logic
  alias: 'Airbnb: Midnight Logic'
  description: 'At midnight, if reserved -> floodlight to motion-sensor mode (scene.sensor_mode + light off).'
  mode: single
  triggers:
  - trigger: time
    at: '00:00:00'
  conditions:
  - condition: template
    value_template: "{{ 'reserved' in (state_attr('calendar.airbnb','message') | string | lower) }}"
  actions:
  - action: scene.turn_on
    target: {entity_id: scene.sensor_mode}
  - action: light.turn_off
    target: {entity_id: light.wasserstein_smart_floodlight_2}
- id: airbnb_reservation_start
  alias: 'Airbnb: Reservation Start'
  description: 'Calendar shows Reserved -> heater to heat at set temp (default 20C), set ONCE so the guest can still turn it on/off and change temp manually. Floodlight ON if evening (after sunset, before midnight), else motion-sensor mode.'
  mode: single
  triggers:
  - trigger: state
    entity_id: calendar.airbnb
    attribute: message
  conditions:
  - condition: template
    value_template: "{{ 'reserved' in (state_attr('calendar.airbnb','message') | string | lower) }}"
  actions:
  - action: climate.set_hvac_mode
    target: {entity_id: climate.airbnb_infrared_heater_2}
    data: {hvac_mode: heat}
  - action: climate.set_temperature
    target: {entity_id: climate.airbnb_infrared_heater_2}
    data: {temperature: "{{ states('input_number.airbnb_heater_temperature') | float(20) }}"}
  - if:
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    - condition: template
      value_template: "{{ now().hour >= 12 }}"
    then:
    - action: scene.turn_on
      target: {entity_id: scene.manual_on}
    else:
    - action: scene.turn_on
      target: {entity_id: scene.sensor_mode}
- id: airbnb_reservation_end
  alias: 'Airbnb: Reservation End'
  description: 'Calendar no longer Reserved (Airbnb Not available or blank) -> heater OFF and floodlight to motion-sensor mode.'
  mode: single
  triggers:
  - trigger: state
    entity_id: calendar.airbnb
    attribute: message
  conditions:
  - condition: template
    value_template: "{{ 'reserved' not in (state_attr('calendar.airbnb','message') | string | lower) }}"
  actions:
  - action: climate.set_hvac_mode
    target: {entity_id: climate.airbnb_infrared_heater_2}
    data: {hvac_mode: 'off'}
  - action: scene.turn_on
    target: {entity_id: scene.sensor_mode}
