      - light.garage_left_downlight_segment_9
      - light.garage_left_downlight_segment_10
      - light.garage_left_downlight_segment_11
      - light.garage_left_downlight_segment_12
      - light.garage_left_downlight_segment_13
      - light.garage_left_downlight_segment_14
