- actions:
  - variables:
      izaan_speed: '{{ ([states(''sensor.izaans_room_temperature'') | float(23.5), states(''sensor.izaan_s_echo_dot_temperature'') | float(23.5)] | max - 23.5) / 2 * 100 | round(0) | min(100) | max(0) }}'
      kitchen_speed: '{{ ((states(''sensor.downstairs_echo_dot_temperature'') | float(23.5) - 23.5) / 2 * 100) | round(0) | min(100) | max(0) }}'
      master_speed: '{{ ((states(''sensor.upstairs_echo_dot_temperature'') | float(23.5) - 23.5) / 2 * 100) | round(0) | min(100) | max(0) }}'
      mina_speed: '{{ ([states(''sensor.minas_room_temperature'') | float(23.5), states(''sensor.mina_s_echo_dot_temperature'') | float(23.5)] | max - 23.5) / 2 * 100 | round(0) | min(100) | max(0) }}'
  - else:
    - action: fan.turn_off
      data: {}
      target:
        entity_id: fan.kitchen_ceiling_fan
    if:
    - above: 23.5
      condition: numeric_state
      entity_id: sensor.downstairs_echo_dot_temperature
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.kitchen_fan
    - action: fan.set_percentage
      data:
        percentage: '{{ kitchen_speed }}'
      target:
        entity_id: fan.kitchen_ceiling_fan
  - else:
    - action: fan.turn_off
      data: {}
      target:
        entity_id: fan.master_bedroom_ceiling_fan
    if:
    - condition: state
      entity_id: person.home
      state: home
    - after: '21:00:00'
      before: 07:00:00
      condition: time
    - above: 23.5
      condition: numeric_state
      entity_id: sensor.upstairs_echo_dot_temperature
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.master_bedroom_fan_light
    - action: fan.set_percentage
      data:
        percentage: '{{ master_speed }}'
      target:
        entity_id: fan.master_bedroom_ceiling_fan
  - else:
    - action: fan.turn_off
      data: {}
      target:
        entity_id: fan.mina_s_ceiling_fan
    if:
    - condition: or
      conditions:
      - above: 23.5
        condition: numeric_state
        entity_id: sensor.minas_room_temperature
      - above: 23.5
        condition: numeric_state
        entity_id: sensor.mina_s_echo_dot_temperature
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.mina_s_light
    - action: fan.set_percentage
      data:
        percentage: '{{ mina_speed }}'
      target:
        entity_id: fan.mina_s_ceiling_fan
  - else:
    - action: fan.turn_off
      data: {}
      target:
        entity_id: fan.izaan_s_ceiling_fan
    if:
    - condition: or
      conditions:
      - above: 23.5
        condition: numeric_state
        entity_id: sensor.izaans_room_temperature
      - above: 23.5
        condition: numeric_state
        entity_id: sensor.izaan_s_echo_dot_temperature
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.izaan_s_bedroom_light
    - action: fan.set_percentage
      data:
        percentage: '{{ izaan_speed }}'
      target:
        entity_id: fan.izaan_s_ceiling_fan
  - else:
    - action: fan.turn_off
      data: {}
      target:
        entity_id: fan.guest_room_ceiling_fan
    if:
    - condition: state
      entity_id: switch.airbnb_reserved
      state: 'on'
    - above: 23.5
      condition: numeric_state
      entity_id: sensor.ecobee_current_temperature
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.guest_room_light
    - action: fan.set_percentage
      data:
        percentage: '{{ kitchen_speed }}'
      target:
        entity_id: fan.guest_room_ceiling_fan
