- actions:
  - action: lock.lock
    target:
      entity_id: |
        {{ states.lock
           | rejectattr('entity_id', 'eq', 'lock.airbnb')
           | selectattr('state', 'eq', 'unlocked')
           | map(attribute='entity_id')
           | list }}
  - data:
      agent_id: conversation.local_chat
      text: |
        These locks were unlocked and have been automatically locked: {{ unlocked }}. Compose a one-sentence, calm bedtime message confirming the locks are now secure.
    response_variable: agent
    service: conversation.process
  - data:
      data:
        type: announce
      message: '{{ agent.response.speech.plain.speech }}'
      target:
      - media_player.upstairs_echo_dot
    service: notify.alexa_media
  alias: 'Proactive: nightly lock check + auto-lock'
  conditions:
  - condition: template
    value_template: '{{ unlocked != '''' }}'
  description: At 23:30, lock any unlocked locks (excluding Airbnb) and announce via LLM-generated narration through the upstairs Echo.
  id: proactive_nightly_lock_check
  mode: single
  triggers:
  - at: '23:30:00'
    trigger: time
  variables:
    unlocked: |
      {{ states.lock
         | rejectattr('entity_id', 'eq', 'lock.airbnb')
         | selectattr('state', 'eq', 'unlocked')
         | map(attribute='attributes.friendly_name')
         | list
         | join(', ') }}
