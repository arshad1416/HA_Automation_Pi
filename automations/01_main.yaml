    entity_id: input_boolean.climate_ai_enabled
    state: 'on'
  description: Winter set ecobee to 22C at 7am and 11pm daily. Gas flat-priced.
  id: climate_winter_maintain
  mode: single
  triggers:
  - at: 07:00:00
    id: morning
    trigger: time
  - at: '23:00:00'
    id: night
    trigger: time
- actions:
  - variables:
      indoor_temp: '{{ ((states(''sensor.downstairs_echo_dot_temperature'') | float(0) + states(''sensor.upstairs_echo_dot_temperature'') | float(0)) / 2) | round(1) }}'
      outdoor_temp: '{{ state_attr(''weather.forecast_home'', ''temperature'') | float(99) }}'
      wind_dir: '{{ state_attr(''weather.forecast_home'', ''wind_bearing'') | float(0) }}'
  - if:
    - condition: template
      value_template: '{{ outdoor_temp | float < indoor_temp | float and outdoor_temp | float < 24 }}'
    then:
    - variables:
        msg: |
          {% set w = state_attr('weather.forecast_home', 'wind_bearing') | float(0) %} {% if w >= 180 and w < 315 %} Wind from W/SW. Open: Izaan bedroom (SE) + Guest bedroom (SE) windows. Also kitchen sliding door (NW). Creates W to E cross-flow. {% elif w >= 315 or w < 45 %} Wind from N/NW. Open: Guest bedroom (SE) + Living room (SE) windows. Pulls air from NW entry. {% elif w >= 45 and w < 180 %} Wind from E/SE. Open: Master bedroom (NW) + Mina bedroom (NW) windows. Also kitchen sliding door (NW). Reverse cross-flow. {% else %} Light/variable wind. Open: Upper SE windows (Izaan + Guest) + Main NW door (kitchen). Stack effect cooling. {% endif %}
          Indoor: {{ indoor_temp }}C. Out: {{ outdoor_temp }}C.
          Blinds are closed for privacy. Open windows behind closed blinds.
    - action: notify.mobile_app_cph2655
      data:
        message: '{{ msg }}'
        title: Cross-Ventilation Recommended
  alias: climate_crossvent_alert
  conditions:
  - condition: state
    entity_id: input_boolean.climate_summer_mode
    state: 'on'
  - condition: template
    value_template: '{{ now().month in [6, 7, 8] }}'
  description: Summer nights (Jun-Aug) at 10pm, notify which windows to open for cross-ventilation. Uses Echo Dot indoor temps for accuracy.
  id: climate_crossvent_alert
  initial_state: false
  mode: single
  triggers:
  - at: '22:00:00'
    trigger: time
- id: climate_ai_advisor
  alias: climate_ai_advisor
  description: 'Every 60 min: Climate AI via Gemini. Recommends setpoint, HVAC mode, fan speed, blinds.'
  triggers:
  - minutes: 0
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: input_boolean.climate_ai_enabled
    state: 'on'
  - condition: template
    value_template: '{{ now().hour >= 6 }}'
  actions:
  - variables:
      prompt: "You are a home climate AI. Analyze the sensor data and recommend HVAC adjustments.\n                Respond ONLY with valid JSON, no markdown, no thinking, no commentary.\n                Top-level keys: setpoint (null or 21.5-24.0C), hvac_mode (heat/cool/off/auto/null),\n                fan (object: room+speed, or null), blinds (object: dining/family/mina), vent_boosters (object: izaan/mina with percentage 0-100 or null),\n                reason (string). Rooms: kitchen, master, mina, guest, izaan. Speed: 1-3 or off (1=slow, 2=medium, 3=high).\n                Perceived temps (pre-calculated): Dn={{ ((states('sensor.downstairs_echo_dot_temperature') | float(states('sensor.izaans_room_temperature') | float(21)) + (states('sensor.ecobee_current_humidity') | float(45) - 45) * 0.1) | round(1)) }}C Up={{ ((states('sensor.upstairs_echo_dot_temperature') | float(states('sensor.minas_room_temperature') | float(21)) + (states('sensor.ecobee_current_humidity') | float(45) - 45) * 0.1) | round(1)) }}C. Humidity >55% feels warmer, <35% feels cooler.\n                Summer=prefer Cool, fans on. When switching between heat and cool, set the desired mode directly..\n                Winter=prefer Heat, fans off/low.\n                Outdoor: {{ state_attr(\"weather.forecast_home\", \"temperature\") }}C\n                Humidity: E={{ states(\"sensor.ecobee_current_humidity\") }}% S={{ states(\"sensor.h5100_2c6f_humidity\") }}%\n                Echo: Dn={{ states(\"sensor.downstairs_echo_dot_temperature\") }}C Up={{ states(\"sensor.upstairs_echo_dot_temperature\") }}C\n                Indoor: Iz={{ states(\"sensor.izaans_room_temperature\") }}C Mi={{ states(\"sensor.minas_room_temperature\") }}C Bsmt={{ states(\"sensor.basement_temperature\") }}C\n                Ecobee: {{ states(\"climate.ecobee\") }}\n                LeakSensorTemperatures: BB={{ states(\"sensor.basement_bathroom_leak_sensor_device_temperature\") }}C Ensuite={{ states(\"sensor.ensuite_leak_sensor_device_temperature\") }}C GuestB={{ states(\"sensor.guest_bathroom_leak_sensor_device_temperature\") }}C Powder={{ states(\"sensor.powder_room_leak_sensor_device_temperature\") }}C Laundry={{ states(\"sensor.laundry_room_leak_sensor_device_temperature\") }}C  hvac={{ state_attr(\"climate.ecobee\", \"hvac_action\") }} target={{ state_attr(\"climate.ecobee\", \"temperature\") }}C\\n                Occ:\\  Arshad={{ states(\"person.home\") }} Larissa={{ states(\"person.larissa\") }}\n                Szn={{ \"Summer\" if is_state(\"input_boolean.climate_summer_mode\", \"on\") else \"Winter\" }}\n                Fans: K={{ states(\"fan.kitchen_ceiling_fan\") }} M={{ states(\"fan.master_bedroom_ceiling_fan\") }} Mi={{ states(\"fan.mina_s_ceiling_fan\") }} G={{ states(\"fan.guest_room_ceiling_fan\") }} Iz={{ states(\"fan.izaan_s_ceiling_fan\") }}\n                VentBoosters: Iz={{ states(\"fan.izaan_s_room_20a970\") }}@{{ state_attr(\"fan.izaan_s_room_20a970\", \"percentage\") }}% Mi={{ states(\"fan.mina_s_room_f851f4\") }}@{{ state_attr(\"fan.mina_s_room_f851f4\", \"percentage\") }}%\n                Sw: KFn={{ states(\"switch.kitchen_fan_switch_1\") }} MFn={{ states(\"switch.master_bedroom_fan_light_switch_1\") }}\n                Doors: Front={{ \"open\" if is_state(\"binary_sensor.front_door_door\", \"on\") else \"closed\" }}{{ \"/unlocked\" if is_state(\"lock.front_door\", \"unlocked\") else \"\" }} GE={{ \"open\" if is_state(\"binary_sensor.garages_entry_door_door\", \"on\") else \"closed\" }}{{ \"/unlocked\" if is_state(\"lock.garages_entry_door\", \"unlocked\") else \"\" }}\n                Blinds: DR={{ state_attr(\"cover.dining_room_blinds_curtain\",\"current_position\") }}%open FR={{ state_attr(\"cover.family_room_blinds_curtain\",\"current_position\") }}%open MR={{ state_attr(\"cover.mina_s_blinds_curtain\",\"current_position\") }}%open\n                TV: FR_LG={{ states(\"media_player.lg_webos_tv_un8500auj\") }}\n                Weather: {{ states(\"weather.forecast_home\") }} UV={{ state_attr(\"weather.forecast_home\", \"uv_index\") }} Clouds={{ state_attr(\"\
        weather.forecast_home\", \"cloud_coverage\") }}%\n                Sun={{ states(\"sun.sun\") }} Azimuth={{ state_attr(\"sun.sun\", \"azimuth\") }} deg Elevation={{ state_attr(\"sun.sun\", \"elevation\") }} deg\n                Window facings: dining={{ states(\"input_number.window_dining_room_facing\") }} deg living={{ states(\"input_number.window_living_room_facing\") }} deg family={{ states(\"input_number.window_family_room_facing\") }} deg mina={{ states(\"input_number.window_minas_room_facing\") }} deg master={{ states(\"input_number.window_master_bedroom_facing\") }} deg izaan={{ states(\"input_number.window_izaans_room_facing\") }} deg\n                Rules: Only recommend blind changes when sun ABOVE horizon (elevation > 0). If cloudy >40% or UV<2 or elevation<15°, keep blinds open. If UV>5, close blinds on sunny side (azimuth within 45 deg).\n                All HVAC, fan, and temperature decisions are now handled by this AI. Do not wait for other automations.\n                Summer: close blinds on sunny side (azimuth within 45 deg), OPEN blinds on rooms NOT facing sun.\n                Winter: keep all blinds open for passive solar. If hvac_action=heating: keep all blinds open.\n                Output JSON: {\"setpoint\":N, \"hvac_mode\":\"...\", \"fan\":{\"room\":\"...\",\"speed\":N}, \"blinds\":{\"dining\":N,\"family\":N,\"mina\":N}, \"vent_boosters\":{\"izaan\":N,\"mina\":N}, \"reason\":\"...\"}\n                blinds values: 0-100 or \"no_change\". Use partial values (25,50,75) to block some sun.\nFront door: FrontOpenDuration={{ (as_timestamp(now()) | int(0) - as_timestamp(state_attr('binary_sensor.front_door_door','last_changed') | default(now())) | int(as_timestamp(now()))) // 60 if is_state('binary_sensor.front_door_door','on') else 0 }}min. If open >5 min, recommend closing and note reduced HVAC efficiency. Adjust HVAC conservatively.\nVent booster fans: izaan_s_room_20a970 and mina_s_room_f851f4. If a room is too hot/cold and the ceiling fan is already on, boost the vent. Values: 0-100 (percentage), or null to leave as-is. HARD LIMIT: Between 9PM-7AM, max 30%.\nELECTRICITY RATES (Alectra ULO - Ultra-Low Overnight Time-of-Use):\n WEEKDAYS:\n  11PM-7AM: Ultra-Low Overnight (3.9¢/kWh) - CHEAPEST - PREFER to run HVAC\n  7AM-4PM: Mid-Peak (15.7¢/kWh) - Moderate\n  4PM-9PM: On-Peak (39.1¢/kWh) - VERY EXPENSIVE - AVOID running HVAC\n  9PM-11PM: Mid-Peak (15.7¢/kWh) - Moderate\n WEEKENDS & HOLIDAYS:\n  11PM-7AM: Ultra-Low Overnight (3.9¢/kWh) - CHEAPEST\n  7AM-11PM: Weekend Off-Peak (9.8¢/kWh) - Moderate (all day)\nRULES:\n  Weekdays: Pre-cool during Ultra-Low Overnight (11PM-7AM) to shift load from expensive 4PM-9PM peak.\n  Weekdays 4PM-9PM: Avoid AC if possible. Use fans instead if outdoor < indoor.\n  Weekends: Full day off-peak at 9.8¢. Standard HVAC operation.\n  Summer: overcool by 1-2C during Ultra-Low Overnight so house drifts through 4-9PM peak.\nCurrent Ontario Time: {{ now().strftime('%A %H:%M') }}"
  - action: rest_command.climate_ai_gemini
    data:
      prompt: '{{ prompt }}'
    response_variable: ai_response
  - variables:
      ai_raw: '{{ ai_response.content.candidates[0].content.parts[0].text }}'
      ai_json: '{{ ai_raw if ai_raw is mapping else (ai_raw | regex_replace(''(?i)```json\s*'', '''') | regex_replace(''(?i)```\s*'', '''') | trim | from_json if ai_raw is string and ai_raw | trim != '''' and (ai_raw | trim | regex_search(''[\{\[]'')) else {}) }}'
      hvac_mode: '{{ ai_json.hvac_mode | default(none, true) }}'
      setpoint: '{{ ai_json.setpoint | default(none) }}'
      reason: '{{ ai_json.reason | default(''No recommendation'', true) }}'
  - if:
    - condition: template
      value_template: '{{ hvac_mode is not none and hvac_mode | lower != ''none'' }}'
    then:
    - action: climate.set_hvac_mode
      data:
        hvac_mode: '{{ hvac_mode }}'
      target:
        entity_id: climate.ecobee
  - if:
    - condition: template
      value_template: '{{ is_state(''binary_sensor.front_door_door'', ''on'') }}'
    then:
    - action: notify.mobile_app_cph2655
      data:
        message: Front door is open while HVAC is running. Close it to save energy.
        title: Front Door Open
  - if:
    - condition: template
      value_template: '{{ ai_json.fan is mapping and ai_json.fan.room is defined and ai_json.fan.speed is defined }}'
    then:
    - variables:
        fan_entity: '{{ {''guest'':''fan.guest_room_ceiling_fan'',''izaan'':''fan.izaan_s_ceiling_fan'',''kitchen'':''fan.kitchen_ceiling_fan'',''master'':''fan.master_bedroom_ceiling_fan'',''mina'':''fan.mina_s_ceiling_fan''}.get(ai_json.fan.room, none) }}'
        fan_speed: '{{ ai_json.fan.speed }}'
        fan_switch: '{{ {''guest'':''switch.guest_room_light_switch_1'',''izaan'':''switch.izaan_s_bedroom_light_switch_1'',''kitchen'':''switch.kitchen_fan_switch_1'',''master'':''switch.master_bedroom_fan_light_switch_1'',''mina'':''switch.mina_s_light_switch_1''}.get(ai_json.fan.room, none) }}'
    - else:
      - if:
        - condition: template
          value_template: '{{ fan_switch is not none }}'
        then:
        - action: switch.turn_on
          target:
            entity_id: '{{ fan_switch }}'
        - delay:
            seconds: 2
      - action: fan.turn_on
        data:
          percentage: '{{ fan_speed | int * 33 }}'
        target:
          entity_id: '{{ fan_entity }}'
      if:
      - condition: template
        value_template: '{{ fan_speed == ''off'' }}'
      then:
      - action: fan.turn_off
        target:
          entity_id: '{{ fan_entity }}'
      - action: switch.turn_off
        target:
          entity_id: '{{ fan_switch }}'
  - if:
    - condition: template
      value_template: '{{ ai_json.blinds is mapping and ai_json.blinds.dining is defined and ai_json.blinds.dining | string | lower != ''no_change'' }}'
    - condition: template
      value_template: '{{ state_attr("sun.sun", "elevation") | float(-1) > -5 }}'
    then:
    - action: cover.set_cover_position
      data:
        position: '{{ ai_json.blinds.dining | int(100) | clamp(0, 100) }}'
      target:
        entity_id: cover.dining_room_blinds_curtain
  - if:
    - condition: template
      value_template: '{{ ai_json.blinds is mapping and ai_json.blinds.family is defined and ai_json.blinds.family | string | lower != ''no_change'' }}'
    - condition: template
      value_template: '{{ state_attr("sun.sun", "elevation") | float(-1) > -5 }}'
    then:
    - action: cover.set_cover_position
      data:
        position: '{{ ai_json.blinds.family | int(100) | clamp(0, 100) }}'
      target:
        entity_id: cover.family_room_blinds_curtain
  - if:
    - condition: template
      value_template: '{{ ai_json.blinds is mapping and ai_json.blinds.mina is defined and ai_json.blinds.mina | string | lower != ''no_change'' }}'
    - condition: template
      value_template: '{{ state_attr("sun.sun", "elevation") | float(-1) > -5 }}'
    then:
    - action: cover.set_cover_position
      data:
        position: '{{ ai_json.blinds.mina | int(100) | clamp(0, 100) }}'
      target:
        entity_id: cover.mina_s_blinds_curtain
  - if:
    - condition: template
      value_template: '{{ ai_json.vent_boosters is mapping and ai_json.vent_boosters.izaan is defined and ai_json.vent_boosters.izaan != None and ai_json.vent_boosters.izaan | int >= 0 and ai_json.vent_boosters.izaan | int <= 100 }}'
    then:
    - action: fan.set_percentage
      data:
        percentage: '{{ [[(ai_json.vent_boosters.izaan | default(0, true)) | int(0), 0] | max, 30] | min if now().hour >= 21 or now().hour < 7 else [(ai_json.vent_boosters.izaan | default(0, true)) | int(0), 0] | max }}'
      target:
        entity_id: fan.izaan_s_room_20a970
  - if:
    - condition: template
      value_template: '{{ ai_json.vent_boosters is mapping and ai_json.vent_boosters.mina is defined and ai_json.vent_boosters.mina != None and ai_json.vent_boosters.mina | int >= 0 and ai_json.vent_boosters.mina | int <= 100 }}'
    then:
    - action: fan.set_percentage
      data:
        percentage: '{{ [[(ai_json.vent_boosters.mina | default(0, true)) | int(0), 0] | max, 30] | min if now().hour >= 21 or now().hour < 7 else [(ai_json.vent_boosters.mina | default(0, true)) | int(0), 0] | max }}'
      target:
        entity_id: fan.mina_s_room_f851f4
  - if:
    - condition: template
      value_template: '{{ setpoint is not none and (setpoint | float(-99) >= 20.0 and setpoint | float(-99) <= 26.0) }}'
    then:
    - action: climate.set_temperature
      data:
        temperature: '{{ setpoint }}'
      target:
        entity_id: climate.ecobee
  - if:
    - condition: template
      value_template: '{{ setpoint is not none or hvac_mode is not none or ai_json.fan is mapping }}'
    then:
    - action: notify.persistent_notification
      data:
        message: 'Set: {{ setpoint }}C Mode: {{ hvac_mode }} Fan: {{ ai_json.fan.room if ai_json.fan is mapping else ''-'' }}@{{ ai_json.fan.speed if ai_json.fan is mapping else ''-'' }} Vents: Iz={{ ai_json.vent_boosters.izaan if ai_json.vent_boosters is mapping and ai_json.vent_boosters.izaan is defined else ''--'' }}% Mi={{ ai_json.vent_boosters.mina if ai_json.vent_boosters is mapping and ai_json.vent_boosters.mina is defined else ''--'' }}% Blinds: {{ ai_json.blinds | to_json if ai_json.blinds is mapping else ''none'' }} - {{ reason }}'
        title: 'Climate AI: {{ setpoint }}C {{ hvac_mode }}'
  - if:
    - condition: template
      value_template: '{{ setpoint is not none or hvac_mode is not none or (ai_json.fan is mapping and ai_json.fan.room is defined) or (ai_json.blinds is mapping and (ai_json.blinds.dining is defined or ai_json.blinds.family is defined or ai_json.blinds.mina is defined)) }}'
    then:
    - action: notify.mobile_app_cph2655
      data:
        message: 'Climate AI: {{ ''No change'' if setpoint == ''no_change'' else ''Set '' ~ setpoint ~ ''C '' ~ hvac_mode }}{{ '' Fan: '' ~ ai_json.fan.room ~ ''@'' ~ ai_json.fan.speed if ai_json.fan is mapping else '''' }} - {{ reason }}'
        title: Climate AI
  max: 2
  mode: queued
- actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - on_peak
      sequence:
      - if:
        - condition: template
          value_template: '{{ now().isoweekday() < 6 }}'
        then:
        - action: switch.turn_off
          target:
            entity_id: switch.pool_pump_heater_socket_1
        - action: switch.turn_off
          target:
            entity_id: switch.salt_chlorinator
    - conditions:
      - condition: trigger
        id:
        - ulo_run
        - mid_peak_start
        - off_peak_return
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.pool_pump_heater_socket_1
      - action: switch.turn_on
        target:
          entity_id: switch.salt_chlorinator
  alias: Pool Pump - ULO Schedule
  conditions: []
  description: 'Runs pump + chlorinator during cheapest rate periods. Weekdays: off 4PM-9PM peak. Weekends: on all day (9.8¢ off-peak). Holidays handled as weekends.'
  id: pool_pump_ulo
  mode: single
  triggers:
  - at: 04:00:00
