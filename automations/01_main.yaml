    id: mid_peak_start
    trigger: time
  - at: '16:00:00'
    id: on_peak
    trigger: time
  - at: '21:00:00'
    id: off_peak_return
    trigger: time
- actions:
  - action: switch.turn_on
    target:
      entity_id: switch.foyer_light_switch_1
  alias: Foyer Light on Front Door Open (Daytime Dark)
  conditions:
  - condition: template
    value_template: '{{ state_attr(''sun.sun'', ''elevation'') | float(-1) > 0 }}'
