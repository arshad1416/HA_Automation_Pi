- id: esphome_kitchen_bridge_startup
  alias: ESPHome Kitchen Bridge Startup
  description: Starts the ESPHome-HA bridge daemon on HA startup. Workaround for Python 3.14 ESPHome integration bug.
  triggers:
  - trigger: homeassistant
    event: start
  actions:
  - action: shell_command.start_esphome_kitchen_bridge
- id: stairs_echo_ecobee_motion
  alias: 'Stairs Light - Echo + Ecobee Motion (100%)'
  description: 'When the upstairs Echo presence (switch.stairs_occupancy) AND the ecobee motion sensor both detect motion, and it is dark out (overcast day or after sunset), turn the stair light to 100%.'
  mode: single
  triggers:
  - trigger: state
    entity_id: switch.stairs_occupancy
    to: 'on'
  - trigger: state
    entity_id: binary_sensor.ecobee_motion
    to: 'on'
  conditions:
  - condition: state
    entity_id: switch.stairs_occupancy
    state: 'on'
  - condition: state
    entity_id: binary_sensor.ecobee_motion
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    - condition: template
      value_template: '{{ state_attr(''sun.sun'', ''elevation'') | float(90) < 10 }}'
    - condition: state
      entity_id: weather.forecast_home
      state:
      - cloudy
      - rainy
      - snowy
      - fog
      - overcast
      - partlycloudy
  actions:
  - action: light.turn_on
    target:
      entity_id: light.stair_light
    data:
      brightness_pct: 100
- id: foyer_light_daytime_auto_off
  alias: 'Foyer Light Daytime Auto-Off (no hallway motion)'
  description: 'During the day, if the foyer light is on and the hallway mmWave (presence-3) has seen no motion for 2 minutes, turn the foyer light off. Companion to "Foyer Light on Front Door Open".'
  mode: single
  triggers:
  - trigger: state
    entity_id: binary_sensor.presence_3_presence
    to: 'off'
    for:
      minutes: 2
  - trigger: state
    entity_id: switch.foyer_light_switch_1
    to: 'on'
    for:
      minutes: 2
  conditions:
  - condition: state
    entity_id: switch.foyer_light_switch_1
    state: 'on'
  - condition: state
    entity_id: binary_sensor.presence_3_presence
    state: 'off'
  - condition: template
    value_template: '{{ state_attr(''sun.sun'', ''elevation'') | float(-1) > 0 }}'
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.foyer_light_switch_1
