# Disabled 2026-06-23 — kitchen lighting consolidation. Superseded by binary_sensor.kitchen_presence + downstairs_occupancy_lighting.

- actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.island_light_kitchen_island_light
      - light.kitchen_light
  - action: light.turn_off
    target:
      entity_id:
      - light.cabinet_light_strip_left_nanoleaf_light_strip
      - light.cabinet_light_strip_center_nanoleaf_light_strip
      - light.cabinet_light_strip_right_nanoleaf_light_strip
      - light.nanoleaf_multicolor_ls
      - light.nanoleaf_multicolor_ls_2
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.kitchen_lights_auto_activated
  - action: logbook.log
    data:
      entity_id: light.kitchen_light
      message: Kitchen lights forced off by failsafe (2h presence timeout).
      name: Kitchen Failsafe
  alias: Kitchen Occupancy Failsafe Timeout
  conditions: []
  description: If kitchen occupancy switch stays on for 2+ hours, force it off.
  id: kitchen_occupancy_failsafe_timeout
  mode: single
  triggers:
  - entity_id: binary_sensor.kitchen_mmwave_presence_sensor_presence
    for:
      hours: 2
      minutes: 0
      seconds: 0
    to: 'on'
    trigger: state

- id: kitchen_motion_detection
  alias: Kitchen Motion Detection (mmWave moving_distance)
  description: Watches sensor.kitchen_mmwave_presence_sensor_moving_distance for any state change. When movement is detected, restarts the 2-min timeout and sets kitchen_occupied_motion ON.
  mode: restart
  trigger:
  - trigger: state
    entity_id: sensor.kitchen_mmwave_presence_sensor_moving_distance
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state not in (''unknown'', ''unavailable'', ''none'', '''') }}'
  action:
  - action: timer.start
    target:
      entity_id: timer.kitchen_occupied_timeout
    data:
      duration: 00:02:00
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.kitchen_occupied_motion

- id: kitchen_motion_timeout
  alias: Kitchen Motion Timeout (no movement for 2 min)
  description: When the 2-minute kitchen_occupied_timeout finishes, flip kitchen_occupied_motion OFF.
  mode: single
  trigger:
  - trigger: state
    entity_id: timer.kitchen_occupied_timeout
    to: idle
  action:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.kitchen_occupied_motion

- actions:
  - choose:
    - conditions:
      - condition: trigger
        id: kitchen_on
      sequence:
      - condition: state
        entity_id: input_boolean.kitchen_auto_lights_disable
        state: 'off'
      - action: light.turn_on
        data:
          brightness_pct: 100
        target:
          entity_id:
          - light.cabinet_light_strip_left_nanoleaf_light_strip
          - light.cabinet_light_strip_center_nanoleaf_light_strip
          - light.cabinet_light_strip_right_nanoleaf_light_strip
          - light.nanoleaf_multicolor_ls
          - light.nanoleaf_multicolor_ls_2
          - light.kitchen_light
          - light.kitchen_light
    - conditions:
      - condition: trigger
        id: kitchen_off
      sequence:
      - action: light.turn_off
        data: {}
        target:
          entity_id:
          - light.cabinet_light_strip_left_nanoleaf_light_strip
          - light.cabinet_light_strip_center_nanoleaf_light_strip
          - light.cabinet_light_strip_right_nanoleaf_light_strip
          - light.nanoleaf_multicolor_ls
          - light.nanoleaf_multicolor_ls_2
          - light.kitchen_light
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.kitchen_auto_lights_disable
  alias: Downstairs Kitchen Auto On/Off (Echo + Manual Control)
  conditions: []
  description: Turns kitchen/cabinet lights on when echo kitchen occupancy detected, off when cleared. Manual override via input_boolean.kitchen_auto_lights_disable with 15-min cooldown.
  id: downstairs_cabinet_auto
  mode: restart
  triggers:
  - entity_id: switch.kitchen_occupancy
    id: kitchen_on
    to: 'on'
    trigger: state
  - entity_id: switch.kitchen_occupancy
    id: kitchen_off
    to: 'off'
    trigger: state

- actions:
  - action: switch.turn_off
    target:
      entity_id: switch.kitchen_occupancy
  alias: Kitchen Presence Auto-Reset
  conditions: []
  description: Resets kitchen_occupancy to off after 5 min — prevents sensor from getting stuck on.
  id: kitchen_presence_timeout
  mode: single
  triggers:
  - entity_id: switch.kitchen_occupancy
    for:
      minutes: 5
    to: 'on'
    trigger: state

- id: downstairs_cabinet_occupancy_auto
  alias: Downstairs Kitchen Auto On/Off (mmWave + Manual Override)
  description: Turn kitchen cabinet lights on/off based on Echo occupancy sensor.
  mode: restart
  triggers:
  - entity_id: switch.kitchen_occupancy
    id: kitchen_on
    to: 'on'
    trigger: state
  - entity_id: switch.kitchen_occupancy
    id: kitchen_off
    to: 'off'
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: kitchen_on
      sequence:
      - condition: state
        entity_id: input_boolean.kitchen_auto_lights_disable
        state: 'off'
      - action: light.turn_on
        data:
          brightness_pct: 100
        target:
          entity_id:
          - light.cabinet_light_strip_left_nanoleaf_light_strip
          - light.cabinet_light_strip_center_nanoleaf_light_strip
          - light.cabinet_light_strip_right_nanoleaf_light_strip
          - light.nanoleaf_multicolor_ls
          - light.nanoleaf_multicolor_ls_2
    - conditions:
      - condition: trigger
        id: kitchen_off
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.cabinet_light_strip_left_nanoleaf_light_strip
          - light.cabinet_light_strip_center_nanoleaf_light_strip
          - light.cabinet_light_strip_right_nanoleaf_light_strip
          - light.nanoleaf_multicolor_ls
          - light.nanoleaf_multicolor_ls_2

- id: downstairs_kitchen_safety_off
  alias: Downstairs Kitchen Safety Off (wedged sensor recovery)
  description: Recover from wedged kitchen occupancy sensor by forcing lights off if sensor is stuck on for 2 hours.
  mode: single
  triggers:
  - entity_id: switch.kitchen_occupancy
    to: 'on'
    for:
      hours: 2
    trigger: state
  conditions: []
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_light
      - light.island_light_kitchen_island_light
      - light.cabinet_light_strip_left_nanoleaf_light_strip
      - light.cabinet_light_strip_center_nanoleaf_light_strip
      - light.cabinet_light_strip_right_nanoleaf_light_strip
      - light.nanoleaf_multicolor_ls
      - light.nanoleaf_multicolor_ls_2
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.kitchen_occupied_motion
  - action: notify.mobile_app_cph2655
    data:
      message: Kitchen occupancy sensor wedged for 2h - lights forced off for safety.

- id: kitchen_nest_motion_to_occupancy
  alias: Kitchen Nest Hub Motion → Occupancy
  description: Set kitchen occupancy boolean when Nest Hub motion is detected.
  mode: restart
  triggers:
  - entity_id: input_boolean.nest_kitchen_presence
    to: 'on'
    id: motion_on
    trigger: state
  - entity_id: input_boolean.nest_kitchen_presence
    to: 'off'
    id: motion_off
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.kitchen_occupied_motion
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.kitchen_occupied_motion

- id: esphome_kitchen_bridge_startup
  alias: ESPHome Kitchen Bridge Startup
  description: 'Starts the ESPHome→HA bridge daemon on HA startup. Workaround for Python 3.14 ESPHome integration bug.'
  trigger:
    - platform: homeassistant
      event: start
  action:
    - action: shell_command.start_esphome_kitchen_bridge
